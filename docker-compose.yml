services:

  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw_home:/home/node
      - ./config/instagram_cookies.json:/home/node/config/instagram_cookies.json:ro
      - ./config/accounts.json:/home/node/config/accounts.json:ro
    environment:
      OPENCLAW_NO_ONBOARD: "0"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    networks:
      - openclaw-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent:
    build: ./agent
    container_name: openclaw-agent
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    networks:
      - openclaw-network
    depends_on:
      postgres:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    volumes:
      - ./config/accounts.json:/app/config/accounts.json:ro
      - ./config/instagram_cookies.json:/app/config/instagram_cookies.json:ro
      - ./logs/agent:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dashboard:
    build: ./dashboard
    container_name: openclaw-dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      - openclaw-network
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: openclaw-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    networks:
      - openclaw-network
    depends_on:
      - dashboard

volumes:
  postgres_data:
  openclaw_home:

networks:
  openclaw-network:
    driver: bridge
